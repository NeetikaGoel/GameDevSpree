<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Page</title>
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body class="game-body">
  <div class="container py-5">
    <h2 class="text-white mb-4">Payment / Checkout</h2>

    <div id="emptyCartMessage" class="alert alert-warning d-none">
      Your cart is empty. Please add products from the home page first.
      <div class="mt-3">
        <a href="index.html" class="btn btn-dark">Go to Home</a>
      </div>
    </div>

    <form action="php/save_order.php" method="POST" id="paymentForm" class="bg-dark p-4 rounded">
      <div class="mb-3">
        <label class="form-label text-white">Full Name</label>
        <input type="text" name="full_name" class="form-control" required />
      </div>

      <div class="mb-3">
        <label class="form-label text-white">Email</label>
        <input type="email" name="email" class="form-control" required />
      </div>

      <div class="mb-3">
        <label class="form-label text-white">Phone Number</label>
        <input type="text" name="phone" class="form-control" required />
      </div>

      <div class="mb-3">
        <label class="form-label text-white">Location</label>
        <input type="text" name="location" class="form-control" required />
      </div>

      <div class="mb-3">
        <label class="form-label text-white">Payment Method</label>
        <select name="payment_method" class="form-control" required>
          <option value="">Select Payment Method</option>
          <option value="UPI">UPI</option>
          <option value="Card">Card</option>
          <option value="Cash on Delivery">Cash on Delivery</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label text-white">Cart Summary</label>
        <div id="cartSummary" class="bg-light p-3 text-dark"></div>
      </div>

      <input type="hidden" name="cart_data" id="cartData" />

      <button type="submit" class="btn btn-warning">Place Order</button>
      <a href="index.html" class="btn btn-outline-light ms-2">Back to Home</a>
    </form>
  </div>

  <script type="module" src="js/payment.js"></script>
</body>
</html>
