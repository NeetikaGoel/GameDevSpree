<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ GAME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="page-shell">
            <div class="page-top-bar">
                <div class="page-title-block">
                    <h1 class="heading">QUIZ GAME</h1>
                    <div class="page-user-text" id="nav-user-text">Not logged in</div>
                </div>

                <div class="page-nav">
                    <a id="nav-login-link" href="login.html">
                        <button type="button">Login</button>
                    </a>

                    <a id="nav-register-link" href="register.html">
                        <button type="button">Register</button>
                    </a>

                    <a id="nav-add-question-link" href="questionAdd.html" style="display:none;">
                        <button type="button">Add Question</button>
                    </a>

                    <a id="nav-question-set-create-link" href="questionSetCreate.html" style="display:none;">
                        <button type="button">Create Question Set</button>
                    </a>

                    <a id="nav-question-set-edit-link" href="questionSetEdit.html" style="display:none;">
                        <button type="button">Edit Question Set</button>
                    </a>

                    <button type="button" id="nav-logout-button" style="display:none;">Logout</button>
                </div>
            </div>

            <div class="page-content">
                <div class="game-quiz-container">
                    <section class="hero-panel">
                        <p class="hero-kicker">WELCOME TO THE ULTIMATE QUIZ CHALLENGE</p>
                        <h2 class="hero-title">Play. Think. Win.</h2>
                        <p class="hero-description">
                            Test your knowledge with exciting quiz rounds, challenge yourself with smart questions,
                            and see how far you can go!!
                        </p>

                        <div class="next-button-container hero-button-row">
                            <button type="button" id="index-start-quiz-button">Start Quiz</button>
                            <button type="button" id="guest-login-button">Continue as Guest</button>
                        </div>

                        <p id="login-message-text" class="page-inline-message"></p>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="login.js"></script>
</body>
</html>
