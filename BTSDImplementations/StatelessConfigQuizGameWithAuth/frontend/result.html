<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ RESULT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="heading">QUIZ RESULT</h1>

    <main>
        <div class="game-quiz-container">
            <div class="game-question-container">
                <h1>Quiz Completed!!</h1>
            </div>

            <div class="game-question-container">
                <h1>Score: <span id="quiz-result-score">0</span></h1>
                <h1>Questions Done: <span id="quiz-result-questions-done">0</span></h1>
                <h1>Total Questions: <span id="quiz-result-question-count-total">0</span></h1>
                <h1>Wrong Answers: <span id="quiz-result-answer-count-wrong">0</span></h1>
                <h1>Score Percentage: <span id="quiz-result-score-percentage">0</span>%</h1>
                <h1 id="quiz-result-text">Loading result...</h1>
            </div>

            <div class="next-button-container">
                <a href="index.html">
                    <button type="button">Play Again!</button>
                </a>
            </div>
        </div>
    </main>

    <script type="module" src="quiz.js"></script>
</body>
</html>
