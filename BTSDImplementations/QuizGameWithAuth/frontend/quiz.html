<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ GAME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="page-shell page-shell-wide">
            <div class="page-top-bar">
                <div class="page-title-block">
                    <h1 class="heading">QUIZ GAME</h1>
                    <div class="page-user-text" id="nav-user-text">Not logged in</div>
                </div>

                <div class="page-nav">
                    <a id="nav-login-link" href="login.html">
                        <button type="button">Login</button>
                    </a>

                    <a id="nav-register-link" href="register.html">
                        <button type="button">Register</button>
                    </a>

                    <a id="nav-add-question-link" href="questionAdd.html" style="display:none;">
                        <button type="button">Add Question</button>
                    </a>

                    <a id="nav-question-set-create-link" href="questionSetCreate.html" style="display:none;">
                        <button type="button">Create Question Set</button>
                    </a>

                    <a id="nav-question-set-edit-link" href="questionSetEdit.html" style="display:none;">
                        <button type="button">Edit Question Set</button>
                    </a>

                    <button type="button" id="nav-logout-button" style="display:none;">Logout</button>
                </div>
            </div>

            <div class="page-content">
                <div class="game-quiz-container">
                    <section class="quiz-hero-panel">
                        <p class="hero-kicker">LIVE QUIZ ROUND</p>
                        <h2 class="hero-title hero-title-small">Think Fast. Choose Smart.</h2>
                        <p class="hero-description quiz-hero-description">
                            Read the question carefully, lock your answer, and keep your score climbing.
                        </p>
                        <p id="quiz-game-config-name-text" class="page-inline-message">Loading question set...</p>
                    </section>

                    <section class="quiz-status-grid quiz-status-grid-three">
                        <div class="quiz-status-card">
                            <span class="quiz-status-label">Score</span>
                            <span class="quiz-status-value">
                                <span id="quiz-score-current">0</span>
                                <span class="quiz-status-divider">/</span>
                                <span id="quiz-question-count-total">0</span>
                            </span>
                        </div>

                        <div class="quiz-status-card">
                            <span class="quiz-status-label">Highest Score</span>
                            <span class="quiz-status-value">
                                <span id="quiz-score-highest">0</span>
                            </span>
                        </div>

                        <div class="quiz-status-card">
                            <span class="quiz-status-label">Play Count</span>
                            <span class="quiz-status-value">
                                <span id="quiz-play-count">0</span>
                            </span>
                        </div>

                        <div class="quiz-status-card">
                            <span class="quiz-status-label">Progress</span>
                            <span class="quiz-status-value">
                                <span id="quiz-question-id-current">0</span>
                                <span class="quiz-status-divider">/</span>
                                <span id="quiz-question-count-total-second">0</span>
                            </span>
                        </div>
                    </section>

                    <section class="quiz-main-panel">
                        <div class="quiz-question-panel">
                            <p class="quiz-question-kicker">CURRENT QUESTION</p>
                            <h1 id="quiz-question-text-current">Loading question...</h1>
                        </div>

                        <form id="quiz-answer-form" class="quiz-form-panel">
                            <div id="quiz-answer-options-container" class="quiz-options-panel">
                                <!-- TypeScript will insert radio options here -->
                            </div>

                            <div class="next-button-container quiz-submit-row">
                                <button type="submit">Submit Answer</button>
                            </div>
                        </form>
                    </section>

                    <p id="quiz-message-text" class="page-inline-message quiz-inline-message">
                        Choose an answer and submit!!
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="quiz.js"></script>
</body>
</html>
