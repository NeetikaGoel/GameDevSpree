<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ GAME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="page-shell">
            <div class="page-top-bar">
                <div class="page-title-block">
                    <h1 class="heading">QUIZ GAME</h1>
                    <div class="page-user-text" id="nav-user-text">Not logged in</div>
                </div>

                <div class="page-nav">
                    <a id="nav-login-link" href="login.html">
                        <button type="button">Login</button>
                    </a>

                    <a id="nav-register-link" href="register.html">
                        <button type="button">Register</button>
                    </a>

                    <a id="nav-add-question-link" href="questionAdd.html" style="display:none;">
                        <button type="button">Add Question</button>
                    </a>

                    <button type="button" id="nav-logout-button" style="display:none;">Logout</button>
                </div>
            </div>

            <div class="page-content">
                <div class="game-quiz-container">
                    <div class="game-details-container">
                        <h1>Score: <span id="quiz-score-current">0</span> / <span id="quiz-question-count-total">0</span></h1>
                        <h1>Question: <span id="quiz-question-id-current">0</span> / <span id="quiz-question-count-total-second">0</span></h1>
                    </div>

                    <div class="game-question-container">
                        <h1 id="quiz-question-text-current">Loading question...</h1>
                    </div>

                    <form id="quiz-answer-form">
                        <div class="game-question-container" id="quiz-answer-options-container">
                            <!-- TypeScript will insert radio options here -->
                        </div>

                        <div class="next-button-container">
                            <button type="submit">Submit Answer -></button>
                        </div>
                    </form>

                    <div class="compact-info-box" id="quiz-message-container">
                        <h1 id="quiz-message-text">Choose an answer and submit!!</h1>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="quiz.js"></script>
</body>
</html>
