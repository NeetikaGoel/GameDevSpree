<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDIT QUESTION SET</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="page-shell">
            <div class="page-top-bar">
                <div class="page-title-block">
                    <h1 class="heading">EDIT QUESTION SET</h1>
                    <div class="page-user-text" id="nav-user-text">Not logged in</div>
                </div>

                <div class="page-nav">
                    <a id="nav-login-link" href="login.html">
                        <button type="button">Login</button>
                    </a>

                    <a id="nav-register-link" href="register.html">
                        <button type="button">Register</button>
                    </a>

                    <a id="nav-add-question-link" href="questionAdd.html" style="display:none;">
                        <button type="button">Add Question</button>
                    </a>

                    <a id="nav-question-set-create-link" href="questionSetCreate.html" style="display:none;">
                        <button type="button">Create Question Set</button>
                    </a>

                    <a id="nav-question-set-edit-link" href="questionSetEdit.html" style="display:none;">
                        <button type="button">Edit Question Set</button>
                    </a>

                    <button type="button" id="nav-logout-button" style="display:none;">Logout</button>
                </div>
            </div>

            <div class="page-content">
                <div class="game-quiz-container">
                    <div class="game-question-container">
                        <h1>Edit an existing question set below</h1>
                    </div>

                    <div class="game-question-container">
                        <h1>Select a question set first</h1>
                    </div>

                    <div id="question-set-edit-config-list-container">
                        <!-- TypeScript will insert config list here -->
                    </div>

                    <div class="next-button-container">
                        <button type="button" id="question-set-edit-config-prev-button">Previous Sets</button>
                        <button type="button" id="question-set-edit-config-next-button">Next Sets</button>
                    </div>

                    <form id="question-set-edit-form">
                        <div class="form-row">
                            <h1>Question Set Id</h1>
                            <input type="text" id="question-set-edit-id-input" readonly>
                        </div>

                        <div class="form-row">
                            <h1>Question Set Name</h1>
                            <input type="text" id="question-set-edit-name-input" name="gameConfigName">
                        </div>

                        <div class="form-row">
                            <h1>Selected Question Count</h1>
                            <input type="text" id="question-set-edit-count-input" readonly>
                        </div>

                        <div class="form-row question-add-correct-row">
                            <label>
                                <input type="checkbox" id="question-set-edit-make-active-input">
                                Make this question set active now
                            </label>
                        </div>

                        <div class="game-question-container">
                            <h1>Choose questions for this set</h1>
                        </div>

                        <div id="question-set-edit-question-list-container">
                            <!-- TypeScript will insert paginated question list here -->
                        </div>

                        <div class="next-button-container">
                            <button type="button" id="question-set-edit-question-prev-button">Previous Questions</button>
                            <button type="button" id="question-set-edit-question-next-button">Next Questions</button>
                        </div>

                        <div class="next-button-container">
                            <button type="submit">Edit Question Set</button>
                        </div>
                    </form>

                    <div class="compact-info-box">
                        <h1 id="question-set-edit-message-text">Only admin can edit question sets.</h1>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="questionSetEdit.js"></script>
</body>
</html>
