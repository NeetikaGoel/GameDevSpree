<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="page-shell">
            <div class="page-top-bar">
                <div class="page-title-block">
                    <h1 class="heading">REGISTER</h1>
                    <div class="page-user-text" id="nav-user-text">Not logged in</div>
                </div>

                <div class="page-nav">
                    <a id="nav-login-link" href="login.html">
                        <button type="button">Login</button>
                    </a>

                    <a id="nav-register-link" href="register.html">
                        <button type="button">Register</button>
                    </a>

                    <a id="nav-add-question-link" href="questionAdd.html" style="display:none;">
                        <button type="button">Add Question</button>
                    </a>

                    <a id="nav-question-set-create-link" href="questionSetCreate.html" style="display:none;">
                        <button type="button">Create Question Set</button>
                    </a>

                    <a id="nav-question-set-edit-link" href="questionSetEdit.html" style="display:none;">
                        <button type="button">Edit Question Set</button>
                    </a>

                    <button type="button" id="nav-logout-button" style="display:none;">Logout</button>
                </div>
            </div>

            <div class="page-content">
                <div class="game-quiz-container">
                    <section class="auth-panel">
                        <p class="hero-kicker">CREATE YOUR PLAYER PROFILE</p>
                        <h2 class="hero-title hero-title-small">Join the Challenge</h2>
                        <p class="hero-description auth-description">
                            Register your account and start tracking your progress like a PRO!!
                        </p>

                        <form id="register-user-form" class="auth-form-panel auth-form-rows">
                            <div class="form-row-inline">
                                <h1>Name</h1>
                                <span class="form-row-inline-separator">:</span>
                                <input type="text" id="register-name-input" name="name" placeholder="Enter your name">
                            </div>
                            
                            <div class="form-row-inline">
                                <h1>Email</h1>
                                <span class="form-row-inline-separator">:</span>
                                <input type="email" id="register-email-input" name="email" placeholder="Enter your email">
                            </div>
                            
                            <div class="form-row-inline">
                                <h1>Password</h1>
                                <span class="form-row-inline-separator">:</span>
                                <input type="password" id="register-password-input" name="password" placeholder="Create a password">
                            </div>

                            <div class="next-button-container hero-button-row">
                                <button type="submit">Register</button>
                                <button type="button" id="register-guest-login-button">Continue as Guest</button>
                            </div>
                        </form>

                        <p id="register-message-text" class="page-inline-message"></p>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="register.js"></script>
</body>
</html>
